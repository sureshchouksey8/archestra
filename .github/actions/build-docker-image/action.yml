name: Build Docker Image
description: Build a Docker image using the Blacksmith builder

inputs:
  context:
    description: "Directory containing the Dockerfile"
    required: true
  dockerfile:
    description: "Path to Dockerfile (defaults to {context}/Dockerfile)"
    required: false
    default: ""
  push:
    description: "Whether to push the image to a registry"
    required: false
    default: "false"
  load:
    description: "Whether to load the image into the local Docker daemon"
    required: false
    default: "false"
  platforms:
    description: "Target platforms for the build (e.g., linux/amd64,linux/arm64)"
    required: false
    default: ""
  tags:
    description: "Image tags (newline or comma separated)"
    required: false
    default: ""
  outputs:
    description: "Custom outputs configuration (e.g., for push-by-digest)"
    required: false
    default: ""
  target:
    description: "Optional Dockerfile target stage"
    required: false
    default: ""
  version:
    description: "Version to pass as VERSION build arg"
    required: false
    default: ""
  previous-image:
    description: "Optional previously published image to extract static assets from before building"
    required: false
    default: ""
  # Secrets must be passed as regular inputs in composite actions
  turbo-team:
    description: "Turborepo remote caching team"
    required: false
    default: ""
  turbo-token:
    description: "Turborepo remote caching token"
    required: false
    default: ""
  sentry-auth-token:
    description: "Sentry auth token for source map uploads (optional)"
    required: false
    default: ""

outputs:
  digest:
    description: "Image digest"
    value: ${{ steps.build.outputs.digest }}
  imageid:
    description: "Image ID"
    value: ${{ steps.build.outputs.imageid }}
  metadata:
    description: "Build metadata"
    value: ${{ steps.build.outputs.metadata }}

runs:
  using: composite
  steps:
    - name: Ensure prev-static-assets directory exists
      shell: bash
      run: mkdir -p "${INPUT_CONTEXT}/prev-static-assets"
      env:
        INPUT_CONTEXT: ${{ inputs.context }}

    - name: Extract previous version static assets
      if: ${{ inputs.previous-image != '' }}
      shell: bash
      run: |
        echo "Pulling previous image: $INPUT_PREVIOUS_IMAGE"
        docker pull "$INPUT_PREVIOUS_IMAGE" || {
          echo "Warning: Failed to pull previous image"
          exit 0
        }

        CID=$(docker create "$INPUT_PREVIOUS_IMAGE" 2>/dev/null) || true
        if [ -n "$CID" ]; then
          echo "Extracting previous static assets from container $CID"
          docker cp "${CID}:/static-assets-source/." "${INPUT_CONTEXT}/prev-static-assets/" || echo "Warning: Failed to copy previous assets"
          docker rm "$CID"
          echo "Successfully extracted previous static assets"
        else
          echo "No previous container created, skipping asset extraction"
        fi
      env:
        INPUT_CONTEXT: ${{ inputs.context }}
        INPUT_PREVIOUS_IMAGE: ${{ inputs.previous-image }}

    - name: Prepare build secrets
      id: prepare-secrets
      shell: bash
      run: |
        {
          echo "value<<EOF"

          if [ -n "${INPUT_TURBO_TEAM}" ]; then
            echo "turbo_team=${INPUT_TURBO_TEAM}"
          fi

          if [ -n "${INPUT_TURBO_TOKEN}" ]; then
            echo "turbo_token=${INPUT_TURBO_TOKEN}"
          fi

          if [ -n "${INPUT_SENTRY_AUTH_TOKEN}" ]; then
            echo "sentry_auth_token=${INPUT_SENTRY_AUTH_TOKEN}"
          fi

          echo "EOF"
        } >> "${GITHUB_OUTPUT}"
      env:
        INPUT_SENTRY_AUTH_TOKEN: ${{ inputs.sentry-auth-token }}
        INPUT_TURBO_TEAM: ${{ inputs.turbo-team }}
        INPUT_TURBO_TOKEN: ${{ inputs.turbo-token }}

    - name: Setup Blacksmith Builder
      uses: ./.github/actions/setup-blacksmith-builder

    - name: Build Docker image
      id: build
      uses: ./.github/actions/blacksmith-build-push
      with:
        context: ${{ inputs.context }}
        file: ${{ inputs.dockerfile != '' && inputs.dockerfile || format('{0}/Dockerfile', inputs.context) }}
        push: ${{ inputs.push }}
        load: ${{ inputs.load }}
        platforms: ${{ inputs.platforms }}
        tags: ${{ inputs.tags }}
        outputs: ${{ inputs.outputs }}
        target: ${{ inputs.target }}
        network: host
        build-args: ${{ inputs.version != '' && format('VERSION={0}', inputs.version) || '' }}
        secrets: ${{ steps.prepare-secrets.outputs.value }}
