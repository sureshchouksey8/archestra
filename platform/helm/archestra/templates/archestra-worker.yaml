{{- if .Values.archestra.worker.enabled }}
{{- $workerPodAnnotations := mergeOverwrite (dict) (.Values.archestra.podAnnotations | default dict) (.Values.archestra.worker.podAnnotations | default dict) }}
{{- if hasKey $workerPodAnnotations "prometheus.io/scrape" }}
{{- $workerPodAnnotations = mergeOverwrite $workerPodAnnotations (dict "prometheus.io/port" "9000" "prometheus.io/path" "/metrics") }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "archestra-platform.fullname" . }}-worker
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "archestra-platform.workerLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.archestra.worker.replicaCount }}
  selector:
    matchLabels:
      {{- include "archestra-platform.workerSelectorLabels" . | nindent 6 }}
  {{- with .Values.archestra.worker.deploymentStrategy }}
  strategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  template:
    metadata:
      labels:
        {{- include "archestra-platform.workerLabels" . | nindent 8 }}
        {{- with .Values.archestra.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- if $workerPodAnnotations }}
      annotations:
        {{- toYaml $workerPodAnnotations | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "archestra-platform.serviceAccountName" . }}
      initContainers:
        {{- include "archestra-platform.initContainers" . | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}-worker
          image: {{ include "archestra-platform.image" . }}
          imagePullPolicy: {{ .Values.archestra.imagePullPolicy | default "IfNotPresent" }}
          workingDir: /app/backend
          {{- if .Values.archestra.initContainers.vaultSecrets.enabled }}
          {{- include "archestra-platform.vaultSecretsCommand" "./scripts/start-production.sh" | nindent 10 }}
          {{- else }}
          command: ["./scripts/start-production.sh"]
          {{- end }}
          ports:
            - name: backend
              containerPort: 9000
              protocol: TCP
          env:
            {{- include "archestra-platform.env" . | nindent 12 }}
            - name: ARCHESTRA_PROCESS_TYPE
              value: "worker"
          {{- with .Values.archestra.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with (.Values.archestra.worker.resources | default .Values.archestra.resources) }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          startupProbe:
            httpGet:
              path: /health
              port: backend
            initialDelaySeconds: {{ .Values.archestra.probes.startup.initialDelaySeconds }}
            periodSeconds: {{ .Values.archestra.probes.startup.periodSeconds }}
            timeoutSeconds: {{ .Values.archestra.probes.startup.timeoutSeconds }}
            failureThreshold: {{ .Values.archestra.probes.startup.failureThreshold }}
          livenessProbe:
            httpGet:
              path: /health
              port: backend
            periodSeconds: {{ .Values.archestra.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.archestra.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.archestra.probes.liveness.failureThreshold }}
          readinessProbe:
            httpGet:
              path: /ready
              port: backend
            periodSeconds: {{ .Values.archestra.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.archestra.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.archestra.probes.readiness.failureThreshold }}
          {{- include "archestra-platform.volumeMounts" . | nindent 10 }}
      {{- with (.Values.archestra.worker.nodeSelector | default .Values.archestra.nodeSelector) }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with (.Values.archestra.worker.tolerations | default .Values.archestra.tolerations) }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- include "archestra-platform.volumes" . | nindent 6 }}
{{- end }}
