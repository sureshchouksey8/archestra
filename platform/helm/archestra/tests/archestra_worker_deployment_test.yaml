suite: archestra worker deployment
templates:
  - archestra-worker.yaml
values:
  - ../ci/test-values.yaml
tests:
  - it: worker deployment has default resources configured
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: "2"
      - equal:
          path: spec.template.spec.containers[0].resources.requests.memory
          value: "1Gi"
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: "2Gi"

  - it: worker deployment uses percentage-based rolling update defaults
    asserts:
      - equal:
          path: spec.strategy.type
          value: RollingUpdate
      - equal:
          path: spec.strategy.rollingUpdate.maxSurge
          value: "25%"
      - equal:
          path: spec.strategy.rollingUpdate.maxUnavailable
          value: "25%"

  - it: worker deployment inherits global pod annotations
    set:
      archestra.podAnnotations:
        sidecar.istio.io/inject: "true"
    asserts:
      - equal:
          path: spec.template.metadata.annotations["sidecar.istio.io/inject"]
          value: "true"

  - it: worker deployment merges global and worker pod annotations
    set:
      archestra.podAnnotations:
        sidecar.istio.io/inject: "true"
      archestra.worker.podAnnotations:
        cluster-autoscaler.kubernetes.io/safe-to-evict: "true"
    asserts:
      - equal:
          path: spec.template.metadata.annotations["sidecar.istio.io/inject"]
          value: "true"
      - equal:
          path: spec.template.metadata.annotations["cluster-autoscaler.kubernetes.io/safe-to-evict"]
          value: "true"

  - it: worker deployment forces prometheus scrape port and path to worker metrics endpoint
    set:
      archestra.podAnnotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9050"
        prometheus.io/path: "/custom"
    asserts:
      - equal:
          path: spec.template.metadata.annotations["prometheus.io/scrape"]
          value: "true"
      - equal:
          path: spec.template.metadata.annotations["prometheus.io/port"]
          value: "9000"
      - equal:
          path: spec.template.metadata.annotations["prometheus.io/path"]
          value: "/metrics"

  - it: worker-specific prometheus scrape annotation also forces worker metrics endpoint
    set:
      archestra.worker.podAnnotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9050"
        prometheus.io/path: "/custom"
    asserts:
      - equal:
          path: spec.template.metadata.annotations["prometheus.io/scrape"]
          value: "true"
      - equal:
          path: spec.template.metadata.annotations["prometheus.io/port"]
          value: "9000"
      - equal:
          path: spec.template.metadata.annotations["prometheus.io/path"]
          value: "/metrics"

  - it: worker deployment inherits global pod labels
    set:
      archestra.podLabels:
        azure.workload.identity/use: "true"
    asserts:
      - equal:
          path: spec.template.metadata.labels["azure.workload.identity/use"]
          value: "true"

  - it: worker mounts diagnostics volume and env var when diagnostics are enabled
    set:
      archestra.diagnostics.enabled: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: ARCHESTRA_NODE_DIAGNOSTIC_DIR
            value: /var/diagnostics
      - contains:
          path: spec.template.spec.volumes
          content:
            name: diagnostics
            persistentVolumeClaim:
              claimName: RELEASE-NAME-archestra-platform-diagnostics
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: diagnostics
            mountPath: /var/diagnostics
            readOnly: false

  - it: worker sets heap snapshot env var when diagnostics heap snapshots are enabled
    set:
      archestra.diagnostics.enabled: true
      archestra.diagnostics.heapSnapshotsNearHeapLimit: 1
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: ARCHESTRA_NODE_HEAPSNAPSHOT_NEAR_HEAP_LIMIT
            value: "1"

  - it: worker supports overriding the wait-for-postgres image
    set:
      archestra.initContainers.busyboxImage: registry.internal.example.com/platform/busybox:1.36
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: wait-for-postgres
      - equal:
          path: spec.template.spec.initContainers[0].image
          value: registry.internal.example.com/platform/busybox:1.36

  - it: worker applies shared resources to chart-managed init containers
    set:
      archestra.initContainers.resources:
        requests:
          cpu: 100m
          memory: 64Mi
        limits:
          memory: 128Mi
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].resources
          value:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              memory: 128Mi
      - equal:
          path: spec.template.spec.initContainers[1].resources
          value:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              memory: 128Mi

  - it: worker waits for migrations via the platform web server before starting
    asserts:
      - equal:
          path: spec.template.spec.initContainers[1].name
          value: wait-for-migrations
      - equal:
          path: spec.template.spec.initContainers[1].image
          value: busybox:1.36
      # Gates on the platform Service (port 9000), which only listens once the
      # web pod has applied migrations and finished required-data seeding.
      - matchRegex:
          path: spec.template.spec.initContainers[1].command[2]
          pattern: 'HOST="RELEASE-NAME-archestra-platform"'
      - matchRegex:
          path: spec.template.spec.initContainers[1].command[2]
          pattern: "PORT=9000"
      - matchRegex:
          path: spec.template.spec.initContainers[1].command[2]
          pattern: ".*nc -z.*"
      - matchRegex:
          path: spec.template.spec.initContainers[1].command[2]
          pattern: "max_attempts=600"

  - it: worker omits the wait-for-migrations init container when disabled
    set:
      archestra.initContainers.waitForMigrations.enabled: false
    asserts:
      # Only the wait-for-postgres init container remains.
      - lengthEqual:
          path: spec.template.spec.initContainers
          count: 1
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: wait-for-postgres

  - it: worker honors a custom waitForMigrations timeout
    set:
      archestra.initContainers.waitForMigrations.timeoutSeconds: 120
    asserts:
      - matchRegex:
          path: spec.template.spec.initContainers[1].command[2]
          pattern: "max_attempts=120"

  - it: worker supports overriding the wait-for-migrations image
    set:
      archestra.initContainers.busyboxImage: registry.internal.example.com/platform/busybox:1.36
    asserts:
      - equal:
          path: spec.template.spec.initContainers[1].name
          value: wait-for-migrations
      - equal:
          path: spec.template.spec.initContainers[1].image
          value: registry.internal.example.com/platform/busybox:1.36
